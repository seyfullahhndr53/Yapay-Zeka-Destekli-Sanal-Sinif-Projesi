<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sınıf Kontrolü - Öğretmen</title>
    <style>
      body {
        width: 400px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin: 0;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid rgba(255,255,255,0.2);
      }

      .header h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .header p {
        margin: 5px 0 0 0;
        font-size: 13px;
        opacity: 0.9;
      }

      .teacher-info {
        background: rgba(255, 255, 255, 0.15);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        backdrop-filter: blur(10px);
      }

      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }

      .status-card {
        background: rgba(255, 255, 255, 0.1);
        padding: 12px;
        border-radius: 8px;
        text-align: center;
      }

      .status-number {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .status-label {
        font-size: 11px;
        opacity: 0.8;
      }

      .students-section {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .students-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .student-item {
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
      }

      .emotion-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }

      .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.3s ease;
        text-align: center;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
      }

      .btn.primary {
        background: rgba(255, 255, 255, 0.9);
        color: #667eea;
        font-weight: 600;
      }

      .alert-section {
        background: rgba(231, 76, 60, 0.2);
        border: 1px solid rgba(231, 76, 60, 0.4);
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 12px;
      }

      .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 10px;
        opacity: 0.7;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.2);
      }

      .loading {
        text-align: center;
        padding: 20px;
        opacity: 0.7;
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .pulse { animation: pulse 2s infinite; }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>👨‍🏫 AI Sınıf Kontrolü</h2>
      <p>Öğretmen Yönetim Paneli</p>
    </div>

    <div class="teacher-info" id="teacherInfo">
      <div class="loading">🔄 Yükleniyor...</div>
    </div>

    <div class="status-grid">
      <div class="status-card">
        <div class="status-number" id="studentCount">0</div>
        <div class="status-label">Aktif Öğrenci</div>
      </div>
      <div class="status-card">
        <div class="status-number" id="alertCount">0</div>
        <div class="status-label">Dikkat Alarmı</div>
      </div>
    </div>

    <div id="alertSection" class="alert-section" style="display: none;">
      <div style="font-weight: bold; margin-bottom: 5px;">⚠️ Dikkat Gerektiren Öğrenciler</div>
      <div id="alertList"></div>
    </div>

    <div class="students-section">
      <div class="students-title">
        <span>📊 Öğrenci Durumları</span>
        <div class="pulse" style="width: 6px; height: 6px; background: #2ecc71; border-radius: 50%;"></div>
      </div>
      <div id="studentsList">
        <div class="loading">Öğrenci verisi bekleniyor...</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" id="exportBtn">📊 Veri İndir</button>
      <button class="btn" id="settingsBtn">⚙️ Ayarlar</button>
      <button class="btn" id="clearBtn">🗑️ Temizle</button>
      <button class="btn" id="refreshBtn">🔄 Yenile</button>
    </div>

    <div class="footer">
      <div>Öğretmen Paneli v2.1.0</div>
      <div style="margin-top: 3px;">🔒 Güvenli ve Gizli Analiz</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
